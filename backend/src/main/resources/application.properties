spring.application.name=plagshield-backend
server.port=8082

# Database Configuration (persistent H2 for demo/prod-style local use)
spring.datasource.url=jdbc:h2:file:./data/plagdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# File Storage
file.upload-dir=storage/uploads
